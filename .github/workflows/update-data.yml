name: Update Project Data

on:
  schedule:
    # Daily stats refresh at 05:17 UTC
    - cron: "17 5 * * *"
    # Weekly full AI enrichment + discovery Monday 09:17 UTC
    - cron: "17 9 * * 1"
  workflow_dispatch:
    inputs:
      task:
        description: "Which task to run"
        required: true
        default: "refresh"
        type: choice
        options:
          - refresh
          - enrich
          - discover
          - all

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine task
        id: task
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "task=${{ github.event.inputs.task }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "17 9 * * 1" ]; then
            echo "task=all" >> $GITHUB_OUTPUT
          else
            echo "task=refresh" >> $GITHUB_OUTPUT
          fi

      - name: Refresh stats
        if: steps.task.outputs.task == 'refresh' || steps.task.outputs.task == 'all'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/refresh-stats.py

      - name: AI enrichment (new projects only)
        if: steps.task.outputs.task == 'enrich' || steps.task.outputs.task == 'all'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/enrich-ai.py

      - name: Discover new projects
        if: steps.task.outputs.task == 'discover' || steps.task.outputs.task == 'all'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/discover.py --limit 15

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/projects.json; then
            echo "No changes to commit"
            exit 0
          fi
          git add data/projects.json
          git commit -m "chore: update project data (${{ steps.task.outputs.task }}) [skip ci]"
          git push
